name: PieceFinder
options:
  bundleIdPrefix: com.legopiecefinder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  PieceFinder:
    type: application
    platform: iOS
    sources:
      - PieceFinder
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.legopiecefinder.LegoPieceFinder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_KEY_CFBundleDisplayName: "PieceFinder"
        INFOPLIST_KEY_NSCameraUsageDescription: "PieceFinder needs camera access to photograph pieces and scan piles."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PieceFinderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PieceFinderTests
    resources:
      - path: PieceFinderTests/Resources
        buildPhase: resources
    dependencies:
      - target: PieceFinder
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PieceFinder.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PieceFinder"
        CODE_SIGN_STYLE: Automatic
